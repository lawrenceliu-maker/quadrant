<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f3eb" />
    <meta
      name="description"
      content="A calm, personal Eisenhower Matrix task planner."
    />
    <title>Quadrant — Make room for what matters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Libre+Caslon+Display&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand-row">
          <button class="icon-button mobile-only" id="closeSidebar" aria-label="Close menu">
            <span class="material-symbols-rounded">close</span>
          </button>
          <a class="brand" href="#" aria-label="Quadrant home">Quadrant</a>
        </div>

        <nav class="nav-list" aria-label="Main navigation">
          <button class="nav-item active" data-view="today">
            <span class="material-symbols-rounded">wb_sunny</span><span>Today</span>
          </button>
          <button class="nav-item" data-view="all">
            <span class="material-symbols-rounded">view_list</span><span>All tasks</span>
          </button>
          <button class="nav-item" data-view="completed">
            <span class="material-symbols-rounded">check_circle</span><span>Completed</span>
          </button>
        </nav>

        <div class="sidebar-summary">
          <p class="eyebrow">Daily progress</p>
          <div class="progress-ring" id="progressRing">
            <div>
              <strong id="progressPercent">0%</strong>
              <span id="progressFraction">0 / 0 tasks</span>
            </div>
          </div>
          <div class="summary-line"><span class="dot complete"></span><span>Completed</span><strong id="completedCount">0</strong></div>
          <div class="summary-line"><span class="dot active"></span><span>Remaining</span><strong id="remainingCount">0</strong></div>
        </div>

        <blockquote>
          “What is important is seldom urgent.”
          <cite>— Dwight D. Eisenhower</cite>
        </blockquote>

        <div class="sidebar-footer">
          <button class="nav-item" id="clearCompleted">
            <span class="material-symbols-rounded">delete_sweep</span><span>Clear completed</span>
          </button>
        </div>
      </aside>

      <main>
        <header class="topbar">
          <button class="icon-button mobile-only" id="openSidebar" aria-label="Open menu">
            <span class="material-symbols-rounded">menu</span>
          </button>
          <div class="date-block">
            <span class="material-symbols-rounded">calendar_today</span>
            <div>
              <strong id="todayLabel">Today</strong>
              <span id="fullDate"></span>
            </div>
          </div>
          <label class="search-box">
            <span class="material-symbols-rounded">search</span>
            <input id="searchInput" type="search" placeholder="Search tasks..." />
          </label>
          <button class="primary-button" id="openAddModal">
            <span class="material-symbols-rounded">add</span><span>Add task</span>
          </button>
        </header>

        <section class="workspace">
          <div class="workspace-heading">
            <div>
              <p class="eyebrow">Eisenhower matrix</p>
              <h1>Make room for what matters.</h1>
            </div>
            <p class="drag-hint">
              <span class="material-symbols-rounded">drag_pan</span>
              Drag tasks between quadrants
            </p>
          </div>
          <div class="matrix" id="matrix"></div>
          <footer class="day-footer">
            <div><span class="material-symbols-rounded">task_alt</span><strong id="footerComplete">0 completed today</strong></div>
            <button class="secondary-button" id="reviewDay">Review day</button>
          </footer>
        </section>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="taskModal">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow" id="modalEyebrow">New task</p>
            <h2 id="modalTitle">Add something that matters</h2>
          </div>
          <button class="icon-button" id="closeModal" aria-label="Close modal">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
        <form id="taskForm">
          <input type="hidden" id="taskId" />
          <label>
            Task name
            <input id="taskTitle" required maxlength="80" placeholder="What needs your attention?" />
          </label>
          <div class="form-grid">
            <label>
              Quadrant
              <select id="taskQuadrant"></select>
            </label>
            <label>
              Category
              <input id="taskCategory" maxlength="24" placeholder="Personal" />
            </label>
            <label>
              Due date
              <input id="taskDueDate" type="date" />
            </label>
            <label>
              Time
              <input id="taskDueTime" type="time" />
            </label>
          </div>
          <label>
            Notes
            <textarea id="taskNotes" maxlength="240" placeholder="Optional notes"></textarea>
          </label>
          <div class="modal-actions">
            <button class="danger-button hidden" type="button" id="deleteTask">Delete</button>
            <span></span>
            <button class="secondary-button" type="button" id="cancelModal">Cancel</button>
            <button class="primary-button" type="submit">Save task</button>
          </div>
        </form>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
