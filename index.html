<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="description" content="A focused personal Eisenhower Matrix task planner." />
    <title>Quadrant - What matters today?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="floating-toolbar">
        <a class="brand" href="#" aria-label="Quadrant home">Quadrant</a>
        <nav class="segmented-control" aria-label="Task views">
          <button class="active" data-view="today">Today</button>
          <button data-view="all">All</button>
          <button data-view="completed">Completed</button>
        </nav>
        <div class="toolbar-actions">
          <label class="search-box">
            <span class="material-symbols-rounded">search</span>
            <input id="searchInput" type="search" placeholder="Search tasks" aria-label="Search tasks" />
          </label>
          <div class="progress-compact">
            <span>Progress</span><strong id="progressFraction">0 / 0</strong>
            <div class="progress-track"><span id="progressBar"></span></div>
          </div>
          <button class="smart-import-button" id="smartImport" aria-label="Smart import from journal">
            <span class="material-symbols-rounded">auto_awesome</span><span>Smart Import</span>
          </button>
          <button class="add-button" id="openAddModal" aria-label="Add task"><span class="material-symbols-rounded">add</span></button>
        </div>
      </header>

      <section class="workspace">
        <div class="workspace-heading">
          <p class="date-line"><span id="todayLabel">Today</span> · <span id="fullDate"></span></p>
          <h1>What matters today?</h1>
          <p>Focus on the right things. Make progress that counts.</p>
        </div>
        <div class="matrix" id="matrix"></div>
        <footer class="day-footer">
          <div>
            <span class="material-symbols-rounded">check_circle</span>
            <strong id="footerComplete">0 completed today</strong>
            <span class="footer-divider"></span><span id="remainingCount">0 remaining</span>
          </div>
          <button class="text-button" id="clearCompleted">Clear completed</button>
        </footer>
      </section>
    </main>

    <div class="modal-backdrop hidden" id="taskModal">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <div><p class="eyebrow" id="modalEyebrow">New task</p><h2 id="modalTitle">Add task</h2></div>
          <button class="icon-button" id="closeModal" aria-label="Close modal"><span class="material-symbols-rounded">close</span></button>
        </div>
        <form id="taskForm">
          <input type="hidden" id="taskId" />
          <label>Task name<input id="taskTitle" required maxlength="80" placeholder="What needs your attention?" /></label>
          <div class="form-grid">
            <label>Quadrant<select id="taskQuadrant"></select></label>
            <label>Category<input id="taskCategory" maxlength="24" placeholder="Personal" /></label>
            <label>Due date<input id="taskDueDate" type="date" /></label>
            <label>Time<input id="taskDueTime" type="time" /></label>
          </div>
          <label>Notes<textarea id="taskNotes" maxlength="240" placeholder="Optional notes"></textarea></label>
          <div class="modal-actions">
            <button class="danger-button hidden" type="button" id="deleteTask">Delete task</button><span></span>
            <button class="secondary-button" type="button" id="cancelModal">Cancel</button>
            <button class="primary-button" type="submit">Save</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop hidden" id="importModal">
      <section class="modal import-modal" role="dialog" aria-modal="true" aria-labelledby="importModalTitle">
        <div class="modal-header">
          <div><p class="eyebrow">Local journal analysis</p><h2 id="importModalTitle">Smart Import</h2></div>
          <button class="icon-button" id="closeImportModal" aria-label="Close modal"><span class="material-symbols-rounded">close</span></button>
        </div>
        <p class="import-intro" id="importSummary"></p>
        <div class="import-results" id="importResults"></div>
        <div class="import-privacy">
          <span class="material-symbols-rounded">lock</span>
          Your journal stays on this device. Quadrant only reads files you authorize.
        </div>
        <div class="import-actions">
          <button class="secondary-button" type="button" id="chooseJournalFolder">Change folder</button>
          <span></span>
          <button class="secondary-button" type="button" id="cancelImport">Cancel</button>
          <button class="primary-button" type="button" id="confirmImport">Import selected</button>
        </div>
      </section>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
